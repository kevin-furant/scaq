# Cromwell 本地执行配置文件

include required(classpath("application"))

system {
abort-jobs-on-terminate = true
memory-retry-error-keys = ["OutOfMemory", "Killed-For-OutOfMemory", "Killed"]
max-concurrent-workflows = 5000

# Cromwell will launch up to N submitted workflows at a time, regardless of how many open workflow slots exist
max-workflow-launch-count = 50

# Number of seconds between workflow launches
new-workflow-poll-rate = 20

# Since the WorkflowLogCopyRouter is initialized in code, this is the number of workers
number-of-workflow-log-copy-workers = 10

# Default number of cache read workers
number-of-cache-read-workers = 25

io {
    number-of-attempts = 5
}


abort {
    scan-frequency: 30 seconds
    cache {
        enabled: true
        # Guava cache concurrency.
        concurrency: 1
        ttl: 100 minutes
        # Maximum number of entries in the cache.
        size: 100000
    }
} 

    dns-cache-ttl: 3 minutes
    file-hash-cache = true
}
# 后端配置
backend {
    default = LocalExample
    providers {
        LocalExample {
            actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
            config {
                run-in-background = true
                # 运行时属性：使用自定义 image 字段避免 docker/container 类型冲突
                runtime-attributes = """
                String? image
                Int? cpu
                String? cuda_visible_devices
                """

                # image 存在时走 singularity，不存在时本地 bash 执行
                submit = """
                ${if defined(image) then
                    (if defined(cuda_visible_devices) then
                        "SINGULARITYENV_CUDA_VISIBLE_DEVICES=" + cuda_visible_devices + " "
                     else
                        ""
                    ) +
                    "/public/work/Personal/bijinpeng/miniforge3/envs/singularity/bin/singularity exec --cleanenv " +
                    "-B /public2/Project/liuzhexin/birds/3.call_snp/Ring-necked_pheasant/tmp:/tempdir " +
                    "-B /public:/public " +
                    "-B /public2:/public2 " +
                    "-B /vol01:/vol01 " +
                    "--nv " +
                    "/public2/Project/fuxiangke/pipeline/image/" + image + " " +
                    "/bin/bash " + script
                 else
                    "/usr/bin/env bash " + script
                }
                """


                # 文件系统配置
                filesystems {
                    local {
                        localization: ["soft-link"]
                        caching {
                            duplication-strategy: ["soft-link"]
                            hashing-strategy: "path"
                            check-sibling-md5: false
                        }
                    }
                }

                # 默认运行时属性
                default-runtime-attributes {
                    failOnStderr: false
                    continueOnReturnCode: 0
                }
            }
        }
    }
}

database {
profile = "slick.jdbc.MySQLProfile$"
db {
    driver = "com.mysql.cj.jdbc.Driver"
    #driver = "org.mariadb.jdbc.Driver"
    url = "jdbc:mysql://127.0.0.1:3306/cromwell?rewriteBatchedStatements=true"
    user = "cromwell"
    password = "cromwell"
    connectionTimeout = 5000
}

# For batch inserts the number of inserts to send to the DB at a time
insert-batch-size = 2000
}
